# =====================================================
# docker-compose.local.yml — Môi trường LOCAL (máy cá nhân)
#
# Cách dùng:
#   docker compose -f docker-compose.local.yml up --build
#   docker compose -f docker-compose.local.yml down
#
# Truy cập: http://localhost:8080
# Không ảnh hưởng đến docker-compose.yml (production)
# =====================================================

services:
  # -------------------------
  # BACKEND (Rust + SQLite)
  # -------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kairust_backend_local
    restart: unless-stopped
    environment:
      - RUST_LOG=debug
      # JWT dùng giá trị dev đơn giản, khác với production
      - JWT_SECRET=local-dev-secret-do-not-use-in-production
    volumes:
      # SQLite data tách biệt với production
      - backend_local_data:/data

  # -------------------------
  # FRONTEND (Nginx static)
  # -------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kairust_frontend_local
    restart: unless-stopped
    depends_on:
      - backend

  # -------------------------
  # REVERSE PROXY (Caddy HTTP only, không HTTPS, không DuckDNS)
  # -------------------------
  caddy:
    image: caddy:2.8-alpine
    container_name: kairust_caddy_local
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile
    depends_on:
      - frontend
      - backend

volumes:
  backend_local_data:
