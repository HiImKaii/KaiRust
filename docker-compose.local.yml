services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kairust_backend_local
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:z
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///app/data/kairust.db
      - RUST_LOG=info
    restart: unless-stopped

volumes:
  backend_data_local:
    name: kairust_backend_data_local
  kairust_sandbox_data_local:
    name: kairust_sandbox_data_local
    driver_opts:
      type: tmpfs
  cache_data_local:
    name: kairust_cache_data_local
