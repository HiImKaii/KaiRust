version: '3.8'

services:
  # -------------------------
  # BACKEND SERVICE (RUST)
  # -------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kairust_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - RUST_LOG=info
    # NOTE: Since the backend executes user code, in a real scenario you might
    # want to mount a specific volatile directory or restrict resources
    # mem_limit: 512m
    # cpus: 0.5

  # -------------------------
  # FRONTEND SERVICE (VITE/NGINX)
  # -------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kairust_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
