services:
  # -------------------------
  # BACKEND SERVICE (RUST)
  # -------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kairust_backend
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - DATA_DIR=/data
    volumes:
      - backend_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox_data:/tmp/kairust_sandbox
      - cache_data:/tmp/kairust_cache

  # -------------------------
  # FRONTEND SERVICE (VITE/NGINX)
  # -------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kairust_frontend
    restart: unless-stopped
    depends_on:
      - backend
    # We remove "ports: 80:80" because Caddy will proxy traffic internally

  # -------------------------
  # REVERSE PROXY & HTTPS (CADDY + DUCKDNS)
  # -------------------------
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: kairust_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

  # -------------------------
  # CLOUDFLARE TUNNEL (Public Access)
  # -------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kairust_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://caddy:8080
    depends_on:
      - caddy

volumes:
  caddy_data:
  caddy_config:
  backend_data:
  sandbox_data:
    driver_opts:
      type: tmpfs
      device: tmpfs
  cache_data:
