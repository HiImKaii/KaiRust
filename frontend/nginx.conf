server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Redirect /index.html → /theory
    location = /index.html {
        return 301 /theory;
    }

    # Redirect /dashboard.html → /
    location = /dashboard.html {
        return 301 /;
    }

    # Trang chủ → Dashboard
    location = / {
        try_files /dashboard.html =404;
    }

    # Lý thuyết → Theory SPA
    location = /theory {
        try_files /index.html =404;
    }

    # Trang Luyện tập - hỗ trợ cả /practice và /practice.html
    location /practice {
        try_files /practice.html =404;
    }

    # Dashboard (alias path) → redirect to /
    location = /dashboard {
        return 301 /;
    }

    # Admin Dashboard SPA
    location /admin {
        alias /usr/share/nginx/html/dist-admin/;
        index admin.html;
        try_files $uri $uri/ /admin/admin.html;
    }

    # Static assets (JS, CSS, images, etc.) + SPA fallback cho trang chính
    location / {
        try_files $uri $uri/ /dashboard.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
