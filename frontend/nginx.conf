server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Redirect /index.html → / (clean URL)
    location = /index.html {
        return 301 /;
    }

    # Trang chủ (Lý thuyết) - serve index.html cho /
    location = / {
        try_files /index.html =404;
    }

    # Trang Luyện tập - giữ nguyên practice.html
    location = /practice.html {
        try_files /practice.html =404;
    }

    # Static assets (JS, CSS, images, etc.)
    location / {
        try_files $uri $uri/ =404;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
