server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Redirect /index.html → / (clean URL)
    location = /index.html {
        return 301 /;
    }

    # Trang chủ (Lý thuyết)
    location = / {
        try_files /index.html =404;
    }

    # Trang Luyện tập - hỗ trợ cả /practice và /practice.html
    location /practice {
        try_files /practice.html =404;
    }

    # Admin Dashboard SPA
    location /admin {
        alias /usr/share/nginx/html/dist-admin/;
        index admin.html;
        try_files $uri $uri/ /admin/admin.html;
    }

    # Static assets (JS, CSS, images, etc.) + SPA fallback cho trang chính
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
